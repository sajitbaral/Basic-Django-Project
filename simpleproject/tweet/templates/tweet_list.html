{% extends "base.html" %}

{% block title %}

Tweety

{% endblock %}

{% block contents %}

<h1 class ="text-center mt-4">Welcome to Tweety</h1>

<a class = "btn btn-primary mb-4" href="{% url 'create_tweet' %}">Create a Tweet</a>
<div class="container row gap-3">

    {% for tweet in tweets %}
    
    <div class="card" style="width: 18rem;">
        {% if tweet.photo %}
            <img src="{{ tweet.photo.url }}" class="card-img-top">
        {% endif %}
        <div class="card-body">
            <h5 class="card-title">{{tweet.user.username}}</h5>
            <p class="card-text">{{tweet.text}}</p>
             <a href="{% url 'edit_tweet' tweet.id %}" class="btn btn-primary">Edit</a>
             <a href="{% url 'delete_tweet' tweet.id %}" class="btn btn-danger">Delete</a>
        </div>
    </div>
    
    {% endfor %}

</div>
{% endblock %}
